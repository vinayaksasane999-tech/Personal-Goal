<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Saver</title>

<style>
body {
  font-family: -apple-system;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  padding: 20px;
}

h2 { text-align:center; }

input {
  padding: 12px;
  margin: 5px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  padding: 14px;
  border-radius: 18px;
  border: none;
  color: white;
  font-weight: 600;
}

.add-btn { background: #34c759; }

.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 25px;
  background: rgba(255,255,255,0.08);
}

.save { background:#0a84ff; width:100%; margin-top:10px;}
.delete { background:#ff3b30; width:100%; margin-top:10px;}

</style>
</head>

<body>

<h2>My Goals 🎯</h2>

<input id="name" placeholder="Goal name">
<input id="amount" placeholder="Amount">
<input id="date" type="date">
<br>
<button class="add-btn" onclick="addGoal()">Add Goal</button>

<div id="goals"></div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// ADD
function addGoal() {
  let target = Number(document.getElementById("amount").value);
  let targetDate = new Date(document.getElementById("date").value);
  let today = new Date();

  let days = Math.max(1, Math.ceil((targetDate - today)/(1000*60*60*24)));

  let daily = Math.ceil(target / days);

  let goal = {
    name: document.getElementById("name").value,
    target: target,
    date: document.getElementById("date").value,
    start: new Date().toISOString(), // 🔥 IMPORTANT
    saved: 0,
    daily: daily
  };

  goals.push(goal);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// DELETE
function removeGoal(i) {
  goals.splice(i,1);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// RENDER
function render() {
  let container = document.getElementById("goals");
  container.innerHTML = "";

  goals.forEach((g,i)=>{

    let today = new Date();
    let start = new Date(g.start);
    let targetDate = new Date(g.date);

    let daysPassed = Math.max(0, Math.floor((today - start)/(1000*60*60*24)));
    let daysLeft = Math.max(0, Math.ceil((targetDate - today)/(1000*60*60*24)));

    let expected = daysPassed * g.daily;

    let percent = Math.min(100,(g.saved/g.target)*100);

    container.innerHTML += `
      <div class="card">

        <h3>${g.name}</h3>

        <p>Saved: ₹${g.saved} / ₹${g.target}</p>

        <p>Daily: ₹${g.daily}</p>

        <p>Days Passed: ${daysPassed}</p>
        <p>Days Left: ${daysLeft}</p>

        <p>Expected: ₹${expected}</p>

        <p>Progress: ${Math.round(percent)}%</p>

        <button class="save" onclick="save(${i})">Save ₹${g.daily}</button>
        <button class="delete" onclick="removeGoal(${i})">Cancel</button>

      </div>
    `;
  });
}

// SAVE
function save(i){
  let g = goals[i];

  g.saved += g.daily;

  if(g.saved > g.target) g.saved = g.target;

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

render();
</script>

</body>
</html>
