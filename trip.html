<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Saver Premium</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
}

/* INPUT */
.input-box {
  text-align: center;
  margin-bottom: 30px;
}

input {
  padding: 12px;
  margin: 6px;
  border-radius: 14px;
  border: none;
  width: 28%;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* BUTTON */
.add-btn {
  padding: 13px 22px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  font-weight: 600;
}

/* CARD */
.card {
  width: 280px;
  margin: auto;
  padding: 25px;
  border-radius: 30px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  text-align: center;
}

/* CIRCLE */
.circle {
  width: 160px;
  height: 160px;
  margin: auto;
  position: relative;
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

/* BG */
.bg {
  fill: none;
  stroke: rgba(255,255,255,0.15);
  stroke-width: 12;
}

/* PROGRESS */
.progress {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
  stroke: url(#grad);
  filter: drop-shadow(0 0 6px rgba(59,130,246,0.6));
  transition: stroke-dashoffset 1s ease;
}

/* PERCENT */
.percent {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: 600;
}

/* SUCCESS TICK */
.tick {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 40px;
  color: #22c55e;
  animation: pop 0.5s ease forwards;
}

@keyframes pop {
  0% { transform: translate(-50%, -50%) scale(0); }
  70% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

/* TEXT */
.title {
  margin-top: 15px;
  font-size: 18px;
  font-weight: 600;
}

.info {
  font-size: 14px;
  color: #cbd5f5;
}

/* BUTTONS */
.btn {
  margin-top: 12px;
  padding: 13px;
  border-radius: 14px;
  border: none;
  width: 100%;
  font-weight: 600;
}

.save {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
}

.delete {
  background: #ef4444;
}
</style>
</head>

<body>

<h2>My Goals 🎯</h2>

<div class="input-box">
  <input id="name" placeholder="Goal name">
  <input id="amount" placeholder="Amount">
  <input id="date" type="date">
  <br>
  <button class="add-btn" onclick="addGoal()">Add Goal</button>
</div>

<div id="goals"></div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// ADD
function addGoal() {
  let goal = {
    name: document.getElementById("name").value,
    target: Number(document.getElementById("amount").value),
    date: document.getElementById("date").value,
    saved: 0
  };

  goals.push(goal);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// DELETE
function removeGoal(i) {
  goals.splice(i, 1);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// RENDER
function render() {
  let container = document.getElementById("goals");
  container.innerHTML = "";

  goals.forEach((g, i) => {

    let today = new Date();
    let target = new Date(g.date);

    let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
    let remaining = g.target - g.saved;
    let daily = Math.ceil(remaining / days);

    let percent = Math.min(100, (g.saved / g.target) * 100);

    let radius = 60;
    let circumference = 2 * Math.PI * radius;
    let offset = circumference - (percent / 100) * circumference;

    container.innerHTML += `
      <div class="card">

        <div class="circle">

          ${
            percent >= 100
            ? `<div class="tick">✔</div>`
            :
            `<svg viewBox="0 0 150 150">

              <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#22c55e"/>
                  <stop offset="50%" stop-color="#3b82f6"/>
                  <stop offset="100%" stop-color="#a855f7"/>
                </linearGradient>
              </defs>

              <circle class="bg" cx="75" cy="75" r="${radius}" />

              <circle class="progress"
                cx="75"
                cy="75"
                r="${radius}"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${circumference}"
                data-offset="${offset}">
              </circle>

            </svg>

            <div class="percent">${Math.round(percent)}%</div>`
          }

        </div>

        <div class="title">${g.name}</div>
        <div class="info">₹${g.saved} / ₹${g.target}</div>
        <div class="info">Save ₹${daily}/day • ${days} days left</div>

        <button class="btn save" onclick="save(${i})">Save</button>
        <button class="btn delete" onclick="removeGoal(${i})">Cancel</button>

      </div>
    `;
  });

  setTimeout(() => {
    document.querySelectorAll(".progress").forEach(el => {
      el.style.strokeDashoffset = el.getAttribute("data-offset");
    });
  }, 100);
}

// SAVE
function save(i) {
  let g = goals[i];

  let today = new Date();
  let target = new Date(g.date);

  let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
  let remaining = g.target - g.saved;
  let daily = Math.ceil(remaining / days);

  g.saved += daily;

  fetch("https://script.google.com/macros/s/AKfycbz5FKKYyo36k9xfjWENw5borFMxBnw-9-rR4Az2785wcdPT1aXM4b9Qe74YzaqGxKEw/exec", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      goal: g.name,
      amount: daily
    })
  });

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

render();
</script>

</body>
</html>
