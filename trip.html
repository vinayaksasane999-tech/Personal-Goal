<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Saver</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  padding: 20px;
  color: white;
}

/* INPUT */
.input-box {
  text-align: center;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  width: 28%;
}

.add-btn {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: 600;
}

/* GRID */
.container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

/* GLASS CARD */
.card {
  width: 220px;
  padding: 20px;
  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.2);

  text-align: center;
}

/* CIRCLE */
.circle {
  width: 120px;
  height: 120px;
  margin: auto;
  position: relative;
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

circle {
  fill: none;
  stroke-width: 10;
  cx: 50;
  cy: 50;
  r: 40;
}

.bg {
  stroke: rgba(255,255,255,0.2);
}

.progress {
  stroke-linecap: round;
  stroke-dasharray: 251;
  transition: 0.5s;
}

/* TEXT */
.percent {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  font-size: 20px;
}

.title {
  margin-top: 10px;
  font-weight: 600;
}

.info {
  font-size: 14px;
  color: #cbd5f5;
}

/* BUTTONS */
.btn {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: 600;
  width: 100%;
}

.save { background: #3b82f6; }
.delete { background: #ef4444; }
</style>
</head>

<body>

<h2 style="text-align:center;">My Goals 🎯</h2>

<div class="input-box">
  <input id="name" placeholder="Goal name">
  <input id="amount" placeholder="Amount">
  <input id="date" type="date">
  <br>
  <button class="add-btn" onclick="addGoal()">Add Goal</button>
</div>

<div class="container" id="goals"></div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// ADD GOAL
function addGoal() {
  let goal = {
    name: document.getElementById("name").value,
    target: Number(document.getElementById("amount").value),
    date: document.getElementById("date").value,
    saved: 0
  };

  goals.push(goal);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// DELETE
function removeGoal(i) {
  goals.splice(i, 1);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// RENDER
function render() {
  let container = document.getElementById("goals");
  container.innerHTML = "";

  goals.forEach((g, i) => {
    let today = new Date();
    let target = new Date(g.date);

    let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
    let remaining = g.target - g.saved;
    let daily = Math.ceil(remaining / days);

    let percent = Math.min(100, (g.saved / g.target) * 100);
    let offset = 251 - (251 * percent / 100);

    container.innerHTML += `
      <div class="card">

        <div class="circle">
          <svg viewBox="0 0 100 100">
            <circle class="bg"></circle>
            <circle class="progress"
              stroke="#22c55e"
              stroke-dashoffset="${offset}">
            </circle>
          </svg>
          <div class="percent">${Math.round(percent)}%</div>
        </div>

        <div class="title">${g.name}</div>
        <div class="info">₹${g.saved} / ₹${g.target}</div>
        <div class="info">Save ₹${daily}/day • ${days} days left</div>

        <button class="btn save" onclick="save(${i})">Save</button>
        <button class="btn delete" onclick="removeGoal(${i})">Cancel</button>

      </div>
    `;
  });
}

// SAVE
function save(i) {
  let g = goals[i];

  let today = new Date();
  let target = new Date(g.date);

  let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
  let remaining = g.target - g.saved;
  let daily = Math.ceil(remaining / days);

  g.saved += daily;

  // SEND TO GOOGLE SHEET
  fetch("https://script.google.com/macros/s/AKfycbz5FKKYyo36k9xfjWENw5borFMxBnw-9-rR4Az2785wcdPT1aXM4b9Qe74YzaqGxKEw/exec", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      goal: g.name,
      amount: daily
    })
  });

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

render();
</script>

</body>
</html>
