<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Saver Premium</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  padding: 20px;
  color: white;
}

h2 { text-align: center; }

.input-box {
  text-align: center;
  margin-bottom: 30px;
}

input {
  padding: 14px;
  margin: 6px;
  border-radius: 16px;
  border: none;
  width: 28%;
  background: rgba(255,255,255,0.08);
  color: white;
}

.add-btn {
  padding: 14px 24px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, #34c759, #28a745);
  color: #fff;
  font-weight: 600;
}

.card {
  width: 290px;
  margin: auto;
  padding: 28px;
  border-radius: 32px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  text-align: center;
}

.circle {
  width: 170px;
  height: 170px;
  margin: auto;
  position: relative;
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.bg {
  fill: none;
  stroke: rgba(255,255,255,0.12);
  stroke-width: 12;
}

.progress {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
  stroke: url(#grad);
  transition: stroke-dashoffset 1s ease;
}

.percent {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
}

/* BUTTONS */
.btn {
  margin-top: 14px;
  padding: 15px;
  border-radius: 20px;
  border: none;
  width: 100%;
  font-weight: 600;
  color: white;
}

.save { background: linear-gradient(135deg, #0a84ff, #0066ff); }
.delete { background: linear-gradient(135deg, #ff453a, #ff3b30); }

</style>
</head>

<body>

<h2>My Goals 🎯</h2>

<div class="input-box">
  <input id="name" placeholder="Goal name">
  <input id="amount" placeholder="Amount">
  <input id="date" type="date">
  <br>
  <button class="add-btn" onclick="addGoal()">Add Goal</button>
</div>

<div id="goals"></div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// ADD
function addGoal() {
  let goal = {
    name: document.getElementById("name").value,
    target: Number(document.getElementById("amount").value),
    date: document.getElementById("date").value,
    saved: 0
  };

  goals.push(goal);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// DELETE
function removeGoal(i) {
  goals.splice(i, 1);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// RENDER
function render() {
  let container = document.getElementById("goals");
  container.innerHTML = "";

  goals.forEach((g, i) => {

    let today = new Date();
    let targetDate = new Date(g.date);

    let days = Math.max(1, Math.ceil((targetDate - today)/(1000*60*60*24)));

    let remaining = g.target - g.saved;
    let daily = Math.ceil(remaining / days);

    let percent = Math.min(100, (g.saved / g.target) * 100);

    let radius = 60;
    let circumference = 2 * Math.PI * radius;
    let offset = circumference - (percent / 100) * circumference;

    container.innerHTML += `
      <div class="card">

        <div class="circle">
          <svg viewBox="0 0 150 150">
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#22c55e"/>
                <stop offset="50%" stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#a855f7"/>
              </linearGradient>
            </defs>

            <circle class="bg" cx="75" cy="75" r="${radius}" />

            <circle class="progress"
              cx="75"
              cy="75"
              r="${radius}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}">
            </circle>
          </svg>

          <div class="percent">${Math.round(percent)}%</div>
        </div>

        <h3>${g.name}</h3>
        <p>₹${g.saved} / ₹${g.target}</p>
        <p>Save ₹${daily}/day • ${days} days left</p>

        <button class="btn save" onclick="save(${i})">Save</button>
        <button class="btn delete" onclick="removeGoal(${i})">Cancel</button>

      </div>
    `;
  });
}

// SAVE (FIXED)
function save(i) {
  let g = goals[i];

  let today = new Date();
  let targetDate = new Date(g.date);

  let days = Math.max(1, Math.ceil((targetDate - today)/(1000*60*60*24)));
  let remaining = g.target - g.saved;

  let daily = Math.ceil(remaining / days);

  g.saved += daily;

  if (g.saved > g.target) g.saved = g.target;

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

render();
</script>

</body>
</html>
