<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Saver Premium</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  padding: 20px;
  color: white;
}

/* HEADER */
h2 {
  text-align: center;
}

/* INPUT */
.input-box {
  text-align: center;
  margin-bottom: 25px;
}

input {
  padding: 12px;
  margin: 5px;
  border-radius: 12px;
  border: none;
  width: 28%;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* BUTTON */
.add-btn {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  font-weight: 600;
}

/* GRID */
.container {
  display: flex;
  justify-content: center;
}

/* CARD */
.card {
  width: 280px;
  padding: 25px;
  border-radius: 25px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.15);

  text-align: center;
}

/* CIRCLE */
.circle {
  width: 150px;
  height: 150px;
  margin: auto;
  position: relative;
}

/* SVG FIX */
.circle svg {
  width: 150px;
  height: 150px;
  display: block;
}

/* BACK RING */
.bg {
  fill: none;
  stroke: rgba(255,255,255,0.15);
  stroke-width: 12;
}

/* PROGRESS RING */
.progress {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s ease;
}

/* PERCENT */
.percent {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
  font-weight: 600;
}

/* TEXT */
.title {
  margin-top: 15px;
  font-size: 18px;
  font-weight: 600;
}

.info {
  font-size: 14px;
  color: #cbd5f5;
}

/* BUTTONS */
.btn {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  width: 100%;
  font-weight: 600;
}

.save {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
}

.delete {
  background: #ef4444;
  color: white;
}

</style>
</head>

<body>

<h2>My Goals 🎯</h2>

<div class="input-box">
  <input id="name" placeholder="Goal name">
  <input id="amount" placeholder="Amount">
  <input id="date" type="date">
  <br>
  <button class="add-btn" onclick="addGoal()">Add Goal</button>
</div>

<div class="container" id="goals"></div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// ADD
function addGoal() {
  let goal = {
    name: document.getElementById("name").value,
    target: Number(document.getElementById("amount").value),
    date: document.getElementById("date").value,
    saved: 0
  };

  goals.push(goal);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// DELETE
function removeGoal(i) {
  goals.splice(i, 1);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// COLOR
function getColor(percent) {
  if (percent < 40) return "#ef4444";
  if (percent < 70) return "#f59e0b";
  return "#22c55e";
}

// RENDER
function render() {
  let container = document.getElementById("goals");
  container.innerHTML = "";

  goals.forEach((g, i) => {

    let today = new Date();
    let target = new Date(g.date);

    let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
    let remaining = g.target - g.saved;
    let daily = Math.ceil(remaining / days);

    let percent = Math.min(100, (g.saved / g.target) * 100);
    let color = getColor(percent);

    let radius = 60;
    let circumference = 2 * Math.PI * radius;
    let offset = circumference - (percent / 100) * circumference;

    container.innerHTML += `
      <div class="card">

        <div class="circle">
          <svg viewBox="0 0 150 150">

            <!-- Background -->
            <circle class="bg"
              cx="75"
              cy="75"
              r="${radius}">
            </circle>

            <!-- Progress -->
            <circle class="progress"
              cx="75"
              cy="75"
              r="${radius}"
              stroke="${color}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"
              transform="rotate(-90 75 75)">
            </circle>

          </svg>

          <div class="percent">${Math.round(percent)}%</div>
        </div>

        <div class="title">${g.name}</div>
        <div class="info">₹${g.saved} / ₹${g.target}</div>
        <div class="info">Save ₹${daily}/day • ${days} days left</div>

        <button class="btn save" onclick="save(${i})">Save</button>
        <button class="btn delete" onclick="removeGoal(${i})">Cancel</button>

      </div>
    `;
  });
}

// SAVE
function save(i) {
  let g = goals[i];

  let today = new Date();
  let target = new Date(g.date);

  let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
  let remaining = g.target - g.saved;
  let daily = Math.ceil(remaining / days);

  g.saved += daily;

  fetch("https://script.google.com/macros/s/AKfycbz5FKKYyo36k9xfjWENw5borFMxBnw-9-rR4Az2785wcdPT1aXM4b9Qe74YzaqGxKEw/exec", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      goal: g.name,
      amount: daily
    })
  });

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

render();
</script>

</body>
</html>
