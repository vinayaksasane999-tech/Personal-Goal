<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Saver Premium</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;

  /* 🔥 DARKER SOFT APPLE BACKGROUND */
  background:
    radial-gradient(circle at 50% 0%, #dbe7f1 0%, transparent 40%),
    radial-gradient(circle at 50% 40%, #9ec3df 0%, transparent 55%),
    radial-gradient(circle at 50% 80%, #5f96c7 0%, transparent 70%),
    linear-gradient(to bottom, #dfeaf3, #2f5f94);

  padding: 20px;
  color: white;
}

h2 {
  text-align: center;
  font-weight: 600;
  color: #f1f5f9; /* brighter title */
}

/* INPUT */
.input-box {
  text-align: center;
  margin-bottom: 30px;
}

/* 🔥 INPUT FIX (VISIBLE NOW) */
input {
  padding: 14px;
  margin: 6px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.25);

  background: rgba(0,0,0,0.25); /* darker glass */
  backdrop-filter: blur(20px);

  color: #ffffff;
  width: 28%;
}

/* placeholder visibility */
input::placeholder {
  color: rgba(255,255,255,0.7);
}

/* ADD BUTTON */
.add-btn {
  padding: 14px 24px;
  border-radius: 22px;
  border: none;

  background: linear-gradient(135deg, #34c759, #28a745);
  color: #fff;
  font-weight: 600;
  font-size: 15px;

  box-shadow: 0 8px 20px rgba(52,199,89,0.3);
}

/* 🔥 CARD DARKENED */
.card {
  width: 290px;
  margin: 25px auto;
  padding: 28px;
  border-radius: 32px;

  background: rgba(0,0,0,0.25); /* darker glass */
  backdrop-filter: blur(25px);

  border: 1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.5),
    inset 0 1px 1px rgba(255,255,255,0.1);

  text-align: center;
  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-6px) scale(1.01);
}

/* CIRCLE */
.circle {
  width: 170px;
  height: 170px;
  margin: auto;
  position: relative;

  border-radius: 50%;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(20px);

  box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

/* BG */
.bg {
  fill: none;
  stroke: rgba(255,255,255,0.2);
  stroke-width: 12;
}

/* PROGRESS */
.progress {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
  stroke: url(#grad);
  filter: drop-shadow(0 0 8px rgba(59,130,246,0.6));
  transition: stroke-dashoffset 1s ease;
}

/* TEXT */
.percent {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
  font-weight: 600;
}

/* TICK */
.tick-svg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.tick-circle {
  stroke: #34c759;
  stroke-width: 6;
  fill: none;
  stroke-dasharray: 314;
  stroke-dashoffset: 314;
  animation: circleAnim 0.6s ease forwards;
}

.tick-mark {
  stroke: #34c759;
  stroke-width: 6;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
  animation: tickAnim 0.4s ease forwards;
  animation-delay: 0.5s;
}

@keyframes circleAnim {
  to { stroke-dashoffset: 0; }
}

@keyframes tickAnim {
  to { stroke-dashoffset: 0; }
}

/* TEXT FIX */
.title {
  margin-top: 15px;
  font-size: 18px;
  font-weight: 600;
  color: #ffffff;
}

.info {
  font-size: 14px;
  color: #e2e8f0;
}

/* BUTTONS */
.btn {
  margin-top: 14px;
  padding: 15px;
  border-radius: 22px;
  border: none;
  width: 100%;
  font-weight: 600;
  font-size: 16px;
  color: white;

  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

.save {
  background: linear-gradient(135deg, #0a84ff, #0066ff);
}

.delete {
  background: linear-gradient(135deg, #ff453a, #ff3b30);
}

</style>
</head>

<body>

<h2>My Goals 🎯</h2>

<div class="input-box">
  <input id="name" placeholder="Goal name">
  <input id="amount" placeholder="Amount">
  <input id="date" type="date">
  <br>
  <button class="add-btn" onclick="addGoal()">Add Goal</button>
</div>

<div id="goals"></div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// ADD
function addGoal() {
  let goal = {
    name: document.getElementById("name").value,
    target: Number(document.getElementById("amount").value),
    date: document.getElementById("date").value,
    saved: 0
  };

  goals.push(goal);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// DELETE
function removeGoal(i) {
  goals.splice(i, 1);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// RENDER
function render() {
  let container = document.getElementById("goals");
  container.innerHTML = "";

  goals.forEach((g, i) => {

    let today = new Date();
    let target = new Date(g.date);

    let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
    let remaining = g.target - g.saved;
    let daily = Math.ceil(remaining / days);

    let percent = Math.min(100, (g.saved / g.target) * 100);

    let radius = 60;
    let circumference = 2 * Math.PI * radius;
    let offset = circumference - (percent / 100) * circumference;

    container.innerHTML += `
      <div class="card">

        <div class="circle">

          ${
            percent >= 100
            ? `
            <svg class="tick-svg" width="140" height="140" viewBox="0 0 120 120">
              <circle class="tick-circle" cx="60" cy="60" r="50"/>
              <path class="tick-mark" d="M35 65 L55 85 L85 45"/>
            </svg>
            `
            :
            `
            <svg viewBox="0 0 150 150">
              <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#22c55e"/>
                  <stop offset="50%" stop-color="#3b82f6"/>
                  <stop offset="100%" stop-color="#a855f7"/>
                </linearGradient>
              </defs>

              <circle class="bg" cx="75" cy="75" r="${radius}" />

              <circle class="progress"
                cx="75"
                cy="75"
                r="${radius}"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}">
              </circle>
            </svg>

            <div class="percent">${Math.round(percent)}%</div>
            `
          }

        </div>

        <div class="title">${g.name}</div>
        <div class="info">₹${g.saved} / ₹${g.target}</div>
        <div class="info">Save ₹${daily}/day • ${days} days left</div>

        <button class="btn save" onclick="save(${i})">Save</button>
        <button class="btn delete" onclick="removeGoal(${i})">Cancel</button>

      </div>
    `;
  });
}

// SAVE
function save(i) {
  let g = goals[i];

  let today = new Date();
  let target = new Date(g.date);

  let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
  let remaining = g.target - g.saved;
  let daily = Math.ceil(remaining / days);

  g.saved += daily;

  fetch("https://script.google.com/macros/s/AKfycbz5FKKYyo36k9xfjWENw5borFMxBnw-9-rR4Az2785wcdPT1aXM4b9Qe74YzaqGxKEw/exec", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      goal: g.name,
      amount: daily
    })
  });

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

render();
</script>

</body>
</html>
