<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Saver</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: #e2e8f0;
  padding: 20px;
}

h2 {
  text-align: center;
}

/* INPUT SECTION */
.input-box {
  text-align: center;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  width: 28%;
}

button {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: 600;
}

/* BUTTONS */
.add-btn { background: #22c55e; color: white; }
.save-btn { background: #3b82f6; color: white; }
.delete-btn { background: #ef4444; color: white; margin-left: 8px; }

/* NEUMORPHIC CARD */
.neo-card {
  background: #e5e7eb;
  border-radius: 20px;
  padding: 20px;
  margin: 20px 0;
  color: #111;

  box-shadow:
    8px 8px 16px #cbd5e1,
    -8px -8px 16px #ffffff;
}

/* CIRCLE */
.circle {
  width: 110px;
  height: 110px;
  margin: auto;
  position: relative;
}

.circle svg {
  transform: rotate(-90deg);
  width: 100%;
  height: 100%;
}

circle {
  fill: none;
  stroke-width: 8;
  cx: 50;
  cy: 50;
  r: 40;
}

/* BACKGROUND RING */
.bg {
  stroke: #d1d5db;
}

/* PROGRESS ARC */
.progress {
  stroke-linecap: round;
  stroke-dasharray: 251;
  transition: stroke-dashoffset 0.5s ease;

  /* Soft shadow */
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
}

/* PERCENT TEXT */
.percent {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-weight: 600;
}

/* INFO */
.info {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>My Goals 🎯</h2>

<div class="input-box">
  <input id="name" placeholder="Goal name">
  <input id="amount" placeholder="Amount">
  <input id="date" type="date">
  <br>
  <button class="add-btn" onclick="addGoal()">Add Goal</button>
</div>

<div id="goals"></div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// ADD GOAL
function addGoal() {
  let goal = {
    name: document.getElementById("name").value,
    target: Number(document.getElementById("amount").value),
    date: document.getElementById("date").value,
    saved: 0
  };

  goals.push(goal);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// DELETE GOAL
function removeGoal(i) {
  goals.splice(i, 1);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// RENDER
function render() {
  let container = document.getElementById("goals");
  container.innerHTML = "";

  goals.forEach((g, i) => {
    let today = new Date();
    let target = new Date(g.date);
    let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));

    let remaining = g.target - g.saved;
    let daily = Math.ceil(remaining / days);
    let percent = Math.min(100, (g.saved / g.target) * 100);

    let offset = 251 - (251 * percent / 100);

    container.innerHTML += `
      <div class="neo-card">

        <div class="circle">
          <svg viewBox="0 0 100 100">

            <defs>
              <linearGradient id="grad${i}" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#22d3ee"/>
              </linearGradient>
            </defs>

            <circle class="bg"></circle>

            <circle class="progress"
              stroke="url(#grad${i})"
              stroke-dashoffset="${offset}">
            </circle>

          </svg>

          <div class="percent">${Math.round(percent)}%</div>
        </div>

        <div class="info">
          <h3>${g.name}</h3>
          <p>₹${g.saved} / ₹${g.target}</p>
          <p>Save ₹${daily}/day • ${days} days left</p>

          <button class="save-btn" onclick="save(${i})">Save</button>
          <button class="delete-btn" onclick="removeGoal(${i})">Cancel</button>
        </div>

      </div>
    `;
  });
}

// SAVE
function save(i) {
  let g = goals[i];

  let today = new Date();
  let target = new Date(g.date);
  let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));

  let remaining = g.target - g.saved;
  let daily = Math.ceil(remaining / days);

  g.saved += daily;

  // Google Sheet
  fetch("https://script.google.com/macros/s/AKfycbz5FKKYyo36k9xfjWENw5borFMxBnw-9-rR4Az2785wcdPT1aXM4b9Qe74YzaqGxKEw/exec", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      goal: g.name,
      amount: daily
    })
  });

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

render();
</script>

</body>
</html>
