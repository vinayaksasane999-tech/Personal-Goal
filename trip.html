<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Saver Premium</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  padding: 20px;
  color: white;
}

/* HEADER */
h2 {
  text-align: center;
  font-weight: 600;
}

/* INPUT */
.input-box {
  text-align: center;
  margin-bottom: 25px;
}

input {
  padding: 12px;
  margin: 5px;
  border-radius: 12px;
  border: none;
  width: 28%;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* ADD BUTTON */
.add-btn {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  font-weight: 600;
}

/* GRID */
.container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

/* GLASS CARD */
.card {
  width: 260px;
  padding: 25px;
  border-radius: 25px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.15);

  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}

/* CIRCLE */
.circle {
  width: 140px;
  height: 140px;
  margin: 10px auto;
  position: relative;
}

svg {
  width: 100%;
  height: 100%;
}

/* TEXT */
.percent {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: 600;
}

/* TEXT */
.title {
  margin-top: 12px;
  text-align: center;
  font-weight: 600;
}

.info {
  text-align: center;
  font-size: 13px;
  color: #cbd5f5;
}

/* BUTTONS */
.btn {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  width: 100%;
}

.save {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
}

.delete {
  background: #ef4444;
  color: white;
}

</style>
</head>

<body>

<h2>My Goals 🎯</h2>

<div class="input-box">
  <input id="name" placeholder="Goal name">
  <input id="amount" placeholder="Amount">
  <input id="date" type="date">
  <br>
  <button class="add-btn" onclick="addGoal()">Add Goal</button>
</div>

<div class="container" id="goals"></div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// ADD
function addGoal() {
  let goal = {
    name: document.getElementById("name").value,
    target: Number(document.getElementById("amount").value),
    date: document.getElementById("date").value,
    saved: 0
  };

  goals.push(goal);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// DELETE
function removeGoal(i) {
  goals.splice(i, 1);
  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

// COLOR LOGIC
function getColor(percent) {
  if (percent < 40) return "#ef4444";
  if (percent < 70) return "#f59e0b";
  return "#22c55e";
}

// RENDER
function render() {
  let container = document.getElementById("goals");
  container.innerHTML = "";

  goals.forEach((g, i) => {

    let today = new Date();
    let target = new Date(g.date);

    let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
    let remaining = g.target - g.saved;
    let daily = Math.ceil(remaining / days);

    let percent = Math.min(100, (g.saved / g.target) * 100);
    let color = getColor(percent);

    let circumference = 2 * Math.PI * 50; // 314
    let offset = circumference - (percent / 100) * circumference;

    container.innerHTML += `
      <div class="card">

        <div class="circle">
          <svg viewBox="0 0 120 120">

            <!-- Background -->
            <circle
              cx="60"
              cy="60"
              r="50"
              stroke="rgba(255,255,255,0.15)"
              stroke-width="10"
              fill="none"
            />

            <!-- Progress -->
            <circle
              cx="60"
              cy="60"
              r="50"
              stroke="${color}"
              stroke-width="10"
              fill="none"
              stroke-linecap="round"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"
              transform="rotate(-90 60 60)"
            />

          </svg>

          <div class="percent">${Math.round(percent)}%</div>
        </div>

        <div class="title">${g.name}</div>
        <div class="info">₹${g.saved} / ₹${g.target}</div>
        <div class="info">Save ₹${daily}/day • ${days} days left</div>

        <button class="btn save" onclick="save(${i})">Save</button>
        <button class="btn delete" onclick="removeGoal(${i})">Cancel</button>

      </div>
    `;
  });
}

// SAVE
function save(i) {
  let g = goals[i];

  let today = new Date();
  let target = new Date(g.date);

  let days = Math.max(1, Math.ceil((target - today)/(1000*60*60*24)));
  let remaining = g.target - g.saved;
  let daily = Math.ceil(remaining / days);

  g.saved += daily;

  fetch("https://script.google.com/macros/s/AKfycbz5FKKYyo36k9xfjWENw5borFMxBnw-9-rR4Az2785wcdPT1aXM4b9Qe74YzaqGxKEw/exec", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      goal: g.name,
      amount: daily
    })
  });

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
}

render();
</script>

</body>
</html>
